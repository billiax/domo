<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 128 128">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#6366f1"/>
      <stop offset="100%" stop-color="#8b5cf6"/>
    </linearGradient>
    <linearGradient id="shine" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#fff" stop-opacity="0.15"/>
      <stop offset="50%" stop-color="#fff" stop-opacity="0"/>
    </linearGradient>
  </defs>
  <!-- Rounded square background -->
  <rect width="128" height="128" rx="28" fill="url(#bg)"/>
  <!-- Subtle shine overlay -->
  <rect width="128" height="128" rx="28" fill="url(#shine)"/>
  <!-- D lettermark — geometric, modern -->
  <path d="M38 30h22c22 0 38 10 38 34s-16 34-38 34H38V30z" fill="none" stroke="#fff" stroke-width="7" stroke-linejoin="round" stroke-linecap="round"/>
  <!-- Three horizontal bars inside D — representing CSS/HTML/JS injection layers -->
  <line x1="48" y1="50" x2="72" y2="50" stroke="#c4b5fd" stroke-width="5" stroke-linecap="round"/>
  <line x1="48" y1="64" x2="80" y2="64" stroke="#e0e7ff" stroke-width="5" stroke-linecap="round"/>
  <line x1="48" y1="78" x2="68" y2="78" stroke="#c4b5fd" stroke-width="5" stroke-linecap="round"/>
</svg>
