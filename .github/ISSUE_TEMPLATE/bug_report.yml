name: Bug Report
description: Report a bug in Domo
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of the bug.
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Steps to reproduce the behavior.
      placeholder: |
        1. Install plugin "..."
        2. Navigate to ...
        3. Toggle/click ...
        4. See error
    validations:
      required: true

  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
      description: What you expected to happen.
    validations:
      required: true

  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
      description: What actually happened.
    validations:
      required: true

  - type: dropdown
    id: component
    attributes:
      label: Component
      options:
        - Extension (content script)
        - Side Panel
        - Plugin Editor
        - Background (service worker)
        - Plugin Catalog
        - Documentation
    validations:
      required: true

  - type: input
    id: version
    attributes:
      label: Domo Version
      placeholder: "0.6.0"
    validations:
      required: true

  - type: dropdown
    id: browser
    attributes:
      label: Browser
      options:
        - Chrome
        - Chromium
        - Edge
        - Brave
        - Other

  - type: textarea
    id: logs
    attributes:
      label: Relevant Logs
      description: Paste any relevant console output or error messages.
      render: shell

  - type: textarea
    id: context
    attributes:
      label: Additional Context
      description: Any other context, screenshots, or information.
